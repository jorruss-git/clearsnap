server {
    listen 80;
    server_name clearsnap.app www.clearsnap.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clearsnap.app www.clearsnap.app;

    ssl_certificate /etc/letsencrypt/live/clearsnap.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearsnap.app/privkey.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://adservice.google.com https://tpc.googlesyndication.com; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://pagead2.googlesyndication.com; connect-src 'self' https://www.google-analytics.com https://pagead2.googlesyndication.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com;" always;

    client_max_body_size 10M;

    # Astro static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Astro hashed assets — immutable cache
    location /_astro/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets (images, fonts)
    location /fonts/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API proxy — background removal only
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
